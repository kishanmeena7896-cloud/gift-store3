<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Store Admin Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#ff4081;
color:#fff;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
max-width:1200px;
margin:25px auto;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
margin-bottom:20px;
}

.card h2{
margin-bottom:15px;
}

#productList{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.product-item{
background:#fafafa;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 0 5px rgba(0,0,0,.1);
}

.product-item img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.product-item p{
margin:8px 0;
font-weight:bold;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
margin:5px;
color:#fff;
}

.add{
background:#28a745;
}

.delete{
background:#dc3545;
}

.edit{
background:#ff9800;
}</style>
</head>

<body>

<header>
🎁 Gift Store Admin Panel
</header>

<div class="container">

<div class="card">

<h2>Products</h2>

<button class="add" onclick="openPopup()">➕ Add Product</button>

<div id="productList">

</div>

</div>

<div class="card">

<h2>Orders</h2>

<p>No Orders Yet</p>

</div>

</div>

<!-- Add Product Popup -->
<div id="popup"
style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);">

<div style="background:#fff;width:350px;padding:20px;border-radius:10px;margin:80px auto;">

<h2>Add Product</h2>

<input type="text" id="productName"
placeholder="Product Name"
style="width:100%;padding:10px;margin:10px 0;">

<input type="number" id="productPrice"
placeholder="Price"
style="width:100%;padding:10px;margin:10px 0;">

<input type="text" id="productImage"
placeholder="Image Name (11.jpg)"
style="width:100%;padding:10px;margin:10px 0;">

<button class="add" onclick="saveProduct()">Save</button>

<button class="delete" onclick="closePopup()">Cancel</button>

</div>

</div>

<script>function openPopup() {
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

window.onload = function () {

    let products = localStorage.getItem("products");

    if (products) {
        document.getElementById("productList").innerHTML = products;
    }

};

function saveProduct() {

    let name = document.getElementById("productName").value;
    let price = document.getElementById("productPrice").value;
    let image = document.getElementById("productImage").value;

    if (name == "" || price == "" || image == "") {
        alert("Please fill all fields");
        return;
    }

    let productList = document.getElementById("productList");

    productList.innerHTML += `
    <div class="product-item">
        <img src="images/${image}">
        <p>${name}</p>
        <p>₹${price}</p>

        <button class="delete" onclick="deleteProduct(this)">
            Delete
        </button>
    </div>
    `;

    localStorage.setItem("products", productList.innerHTML);

    document.getElementById("productName").value = "";
    document.getElementById("productPrice").value = "";
    document.getElementById("productImage").value = "";

    closePopup();
}

function deleteProduct(btn) {

    btn.parentElement.remove();

    localStorage.setItem(
        "products",
        document.getElementById("productList").innerHTML
    );
}

</script>

</body>
</html>
